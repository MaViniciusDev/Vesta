spring.application.name=Vesta

# Google Sheets config
google.sheets.spreadsheet-id=1TQCvorpdEOKW-RFNVaItoHSHmHCt3MaqVHLl_zJ_DsA
google.sheets.credentials-file-path=${VESTA_GOOGLE_CREDENTIALS_FILE:file:./vesta-credentials.json}
google.sheets.worksheet-name=P\u00E1gina1

# Async execution pool
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# Local SQLite config
spring.datasource.url=jdbc:sqlite:vesta_dados.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Image storage config
spring.threads.virtual.enabled=true
lefil.storage.path=C:/Vesta/imagens/

# Auto port fallback (if 8080 is busy, Vesta tries the next free port)
vesta.server.preferred-port=8080
vesta.server.max-port-scan=100
